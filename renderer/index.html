<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Folio</title>
  <style>
    body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #f9f9f9; }
    .sidebar { width: 250px; border-right: 1px solid #ddd; padding: 12px; background: #fff; }
    .main { flex: 1; display: flex; flex-direction: column; background: #fff; }
    #title { font-size: 24px; padding: 12px; border: none; border-bottom: 1px solid #ddd; outline: none; }
    #content { flex: 1; padding: 12px; border: none; resize: none; outline: none; font-size: 16px; }
    
    .ai { width: 320px; border-left: 1px solid #ddd; padding: 12px; background: #fff; display: flex; flex-direction: column; }
    .ai-toggle { display: flex; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 10px; overflow: hidden; }
    .ai-toggle button { flex: 1; border: none; padding: 8px; cursor: pointer; background: #eee; }
    .ai-toggle button.active { background: #007bff; color: white; }
    
    button { margin: 4px 0; width: 100%; padding: 8px; cursor: pointer; }
    pre { white-space: pre-wrap; background: #f0f0f0; padding: 10px; border-radius: 4px; flex: 1; overflow-y: auto; font-size: 14px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <button onclick="newNote()">+ New Note</button>
    <div id="notesList"></div>
  </div>

  <div class="main">
    <input id="title" placeholder="Note title" oninput="saveCurrentNote()" />
    <textarea id="content" placeholder="Write here..." oninput="saveCurrentNote()"></textarea>
  </div>

  <div class="ai">
    <strong>AI Source</strong>
    <div class="ai-toggle">
      <button id="btnLocal" class="active" onclick="setMode('local')">Local</button>
      <button id="btnCloud" onclick="setMode('cloud')">Cloud</button>
    </div>

    <button onclick="aiAction('summarize')">Summarize</button>
    <button onclick="aiAction('improve')">Improve Writing</button>
    <textarea id="query" placeholder="Ask about note..." rows="3"></textarea>
    <button onclick="askCustom()">Ask AI</button>
    
    <div style="margin-top: 10px;"><strong>Response:</strong></div>
    <pre id="response">Waiting for action...</pre>
  </div>

  <script src="app.js"></script>
</body>
</html>
