<!DOCTYPE html>
<html>
<head>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 250px; background: rgba(30, 41, 59, 0.5); border-right: 1px solid #334155; padding: 20px; }
        .editor { flex: 1; padding: 40px; display: flex; flex-direction: column; }
        .ai-panel { width: 320px; background: var(--card); border-left: 1px solid #334155; padding: 20px; }
        
        input#title { background: transparent; border: none; font-size: 2rem; color: white; outline: none; margin-bottom: 10px;}
        textarea#content { background: transparent; border: none; color: #94a3b8; font-size: 1.1rem; flex: 1; resize: none; outline: none; }
        
        .tabs { display: flex; gap: 15px; margin-bottom: 20px; font-size: 0.8rem; }
        .tab { cursor: pointer; opacity: 0.5; }
        .tab.active { opacity: 1; border-bottom: 2px solid var(--accent); }
        
        .btn { width: 100%; padding: 10px; background: var(--accent); border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        #response { background: #0f172a; padding: 10px; border-radius: 5px; height: 200px; overflow-y: auto; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <button class="btn" onclick="newNote()">+ New Note</button>
        <div id="notesList"></div>
    </div>
    <div class="editor">
        <input id="title" placeholder="Untitled Note" oninput="saveCurrentNote()">
        <textarea id="content" placeholder="Type here..." oninput="saveCurrentNote()"></textarea>
    </div>
    <div class="ai-panel">
        <div class="tabs">
            <span id="tab-local" class="tab" onclick="setAiSource('local')">Local</span>
            <span id="tab-cloud" class="tab" onclick="setAiSource('cloud')">Ollama Cloud</span>
        </div>
        <button class="btn" onclick="aiAction('summarize')">Summarize</button>
        <button class="btn" onclick="aiAction('improve')">Improve Writing</button>
        <div id="response">Waiting for action...</div>
        <button class="btn" style="background: transparent; border: 1px solid #475569; color: #94a3b8; margin-top: 20px;" onclick="installModel()">Install/Pull Model</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
