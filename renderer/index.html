<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Folio AI | Pro Workspace</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --accent: #38bdf8;
      --pinned: #fbce44;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --border: #334155;
      --floating: #1e293b;
      --danger: #ef4444;
      --success: #10b981;
    }

    body { background: var(--bg); color: var(--text); font-family: "Segoe UI", sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
    #sidebar { width: 260px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s ease; }
    #sidebar.closed { margin-left: -280px; }
    .sidebar-content { padding: 20px; flex: 1; overflow-y: auto; }
    .editor-container { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }
    .toolbar { background: var(--panel); padding: 8px 20px; display: flex; gap: 10px; border-bottom: 1px solid var(--border); align-items: center; }
    .tool-btn { background: transparent; border: 1px solid var(--border); color: white; padding: 6px 9px; cursor: pointer; border-radius: 4px; font-size: 0.75rem; }
    .toolbar-group { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .tool-btn.format-btn { min-width: 34px; padding: 6px 8px; font-weight: 700; }
    #title { background: transparent; border: none; font-size: 2rem; color: white; font-weight: 700; padding: 20px 40px 10px 40px; outline: none; }
    #content { flex: 1; padding: 10px 40px; overflow-y: auto; outline: none; line-height: 1.7; font-size: 1.1rem; color: var(--text); }
    #content h1, #content h2 { line-height: 1.2; margin: 1rem 0 0.5rem; }
    #content h1 { font-size: 2rem; }
    #content h2 { font-size: 1.5rem; }
    #content blockquote { margin: 1rem 0; padding-left: 1rem; border-left: 3px solid var(--accent); color: var(--text-dim); }
    #content ul, #content ol { padding-left: 1.5rem; }
    #content ul[data-list="checklist"] { list-style: none; padding-left: 0; }
    #content ul[data-list="checklist"] li { display: flex; align-items: flex-start; gap: 10px; margin: 0.4rem 0; }
    #content ul[data-list="checklist"] input[type="checkbox"] { margin-top: 0.35rem; accent-color: var(--accent); cursor: pointer; }
    #content a { color: var(--accent); }

    #floatingAI { position: absolute; display: none; background: var(--floating); border: 1px solid var(--accent); border-radius: 8px; padding: 8px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); z-index: 100; flex-direction: column; gap: 8px; width: 220px; }
    .floating-row { display: flex; gap: 4px; }
    #floatingAI button { background: #2d3748; border: none; color: white; padding: 6px; cursor: pointer; font-size: 0.7rem; border-radius: 4px; flex: 1; }
    #customPrompt { background: #0f172a; border: 1px solid var(--border); color: white; padding: 6px; border-radius: 4px; font-size: 0.75rem; outline: none; }

    #aiPanel { width: 350px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; }
    #aiPanel.closed { width: 0; opacity: 0; border: none; pointer-events: none; }
    .ai-header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .provider-shell { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .provider-badge { padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); font-size: 0.7rem; color: var(--pinned); }
    .preset-select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 4px 6px; font-size: 0.75rem; }

    #statusOverlay { display: none; padding: 10px 20px; background: #0ea5e9; color: white; font-size: 0.7rem; font-weight: bold; }
    #aiScrollArea { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .chat-bubble { background: var(--bg); padding: 12px; border-radius: 8px; font-size: 0.85rem; border: 1px solid var(--border); }
    .user-msg { border-left: 3px solid var(--accent); }

    .replacement-zone { background: rgba(56, 189, 248, 0.05); border: 1px dashed var(--accent); padding: 12px; border-radius: 8px; display: none; }
    #applyBtn { background: var(--success); color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 0.75rem; }

    .chat-input-container { padding: 15px; border-top: 1px solid var(--border); background: var(--panel); }
    #sidebarChatInput { width: 100%; background: var(--bg); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; outline: none; box-sizing: border-box; }

    .note-item { display: flex; justify-content: space-between; align-items: center; position: relative; padding: 10px; margin-bottom: 5px; cursor: pointer; border-radius: 6px; transition: 0.2s; font-size: 0.9rem; color: var(--text-dim); }
    .note-item.active { background: var(--accent); color: var(--bg); font-weight: bold; }
    .delete-btn { background: transparent; border: none; color: var(--text-dim); font-size: 0.9rem; cursor: pointer; padding: 0 5px; opacity: 0; transition: 0.2s; }
    .note-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: var(--danger); }
    .delete-btn.confirm-delete { background: var(--danger); color: white !important; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; opacity: 1; animation: pulse 1s infinite; }
    .note-item.active .delete-btn { color: var(--bg); opacity: 0.7; }
    .note-item.active .delete-btn:hover { color: #7f1d1d; opacity: 1; }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .search-shell { margin-top: 16px; display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; }
    #searchInput { flex: 1; background: transparent; border: none; color: var(--text); outline: none; font-size: 0.85rem; }
    #searchInput::placeholder { color: var(--text-dim); }
    .search-clear { display: none; align-items: center; justify-content: center; width: 22px; height: 22px; border: none; border-radius: 999px; background: transparent; color: var(--text-dim); cursor: pointer; font-size: 0.95rem; }
    .search-clear:hover { background: var(--border); color: var(--text); }
    .notes-empty { display: none; margin-top: 16px; color: var(--text-dim); font-size: 0.85rem; text-align: center; padding: 14px 10px; border: 1px dashed var(--border); border-radius: 8px; }
  </style>
</head>
<body>
  <div id="floatingAI">
    <div class="floating-row">
      <button onclick="aiContextual('simplify')">Simplify</button>
      <button onclick="aiContextual('fix')">Fix</button>
    </div>
    <input type="text" id="customPrompt" placeholder="Replacement instruction..." onkeydown="if(event.key==='Enter') aiContextual('custom')">
  </div>

  <div id="sidebar">
    <div class="sidebar-content">
      <button style="background:var(--accent); color:var(--bg); border:none; padding:10px; border-radius:6px; font-weight:bold; cursor:pointer; width:100%;" onclick="newNote()">+ New Note</button>
      <div class="search-shell">
        <input id="searchInput" type="text" placeholder="Search notes..." oninput="updateSearch(this.value)" onkeydown="if(event.key==='Escape'){ event.preventDefault(); clearSearch(); this.blur(); }">
        <button id="clearSearchBtn" class="search-clear" onclick="clearSearch()" aria-label="Clear search">x</button>
      </div>
      <div id="notesList" style="margin-top:20px"></div>
      <div id="notesEmptyState" class="notes-empty">No matching notes</div>
    </div>
  </div>

  <div class="editor-container">
    <div class="toolbar">
      <button class="tool-btn" onclick="toggleSidebar()">Menu</button>
      <button class="tool-btn" onclick="undo()">Undo</button>
      <div class="toolbar-group">
        <button class="tool-btn format-btn" onclick="formatSelection('bold')" title="Bold (Ctrl/Cmd+B)">B</button>
        <button class="tool-btn format-btn" onclick="formatSelection('italic')" title="Italic (Ctrl/Cmd+I)"><em>I</em></button>
        <button class="tool-btn format-btn" onclick="formatSelection('h1')" title="Heading 1 (Ctrl/Cmd+Alt+1)">H1</button>
        <button class="tool-btn format-btn" onclick="formatSelection('h2')" title="Heading 2 (Ctrl/Cmd+Alt+2)">H2</button>
        <button class="tool-btn format-btn" onclick="formatSelection('bullet')" title="Bullet List (Ctrl/Cmd+Shift+8)">List</button>
        <button class="tool-btn format-btn" onclick="formatSelection('number')" title="Numbered List (Ctrl/Cmd+Shift+7)">1. List</button>
        <button class="tool-btn format-btn" onclick="formatSelection('checklist')" title="Checklist">[ ]</button>
        <button class="tool-btn format-btn" onclick="formatSelection('quote')" title="Blockquote">Quote</button>
        <button class="tool-btn format-btn" onclick="formatSelection('link')" title="Add Link (Ctrl/Cmd+Shift+K)">Link</button>
        <button class="tool-btn format-btn" onclick="formatSelection('unlink')" title="Remove Link">Unlink</button>
      </div>
      <div style="flex:1"></div>
      <button class="tool-btn" style="color:var(--accent)" onclick="toggleAI()">AI Assistant</button>
    </div>
    <input id="title" placeholder="Untitled" oninput="saveCurrentNote()">
    <div id="content" contenteditable="true" oninput="saveCurrentNote()"></div>
  </div>

  <div id="aiPanel">
    <div id="statusOverlay"></div>
    <div class="ai-header">
      <div class="provider-shell">
        <span style="font-size:0.75rem; font-weight:bold; color:var(--accent)">AI</span>
        <span id="providerName" class="provider-badge">Local Ollama</span>
        <select id="modelPreset" class="preset-select" aria-label="Model preset"></select>
      </div>
      <button onclick="toggleAI()" style="background:none; border:none; color:white; cursor:pointer">Close</button>
    </div>

    <div id="aiScrollArea">
      <div id="replacementArea" class="replacement-zone">
        <div id="replacementText"></div>
        <button id="applyBtn" onclick="applyReplacement()">Replace Selection</button>
      </div>
      <div id="chatHistory"></div>
    </div>

    <div class="chat-input-container">
      <input type="text" id="sidebarChatInput" placeholder="Ask about the current note..." onkeydown="if(event.key==='Enter') aiChat()">
    </div>
  </div>

  <script src="core/content.js"></script>
  <script src="core/search.js"></script>
  <script src="core/editorCommands.js"></script>
  <script src="services/browserNotesBridge.js"></script>
  <script src="services/hostBridge.js"></script>
  <script src="services/storage.js"></script>
  <script src="services/aiProvider.js"></script>
  <script src="app.js"></script>
</body>
</html>
