<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Folio AI | Workspace</title>
  <style>
    :root {
      --bg: #0b0f1a;
      --panel: #161b2c;
      --accent: #38bdf8;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --border: #2d3748;
      --sidebar-width: 260px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar Transitions */
    #sidebar {
      width: var(--sidebar-width);
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: margin-left 0.3s ease;
      z-index: 10;
    }

    #sidebar.closed { margin-left: calc(var(--sidebar-width) * -1); }

    .sidebar-content { padding: 20px; flex: 1; overflow-y: auto; }

    /* Main Area */
    .editor-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .toolbar {
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      border-bottom: 1px solid var(--border);
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 5px;
    }
    .icon-btn:hover { color: var(--accent); }

    /* Inputs */
    #title {
      background: transparent;
      border: none;
      font-size: 2.2rem;
      color: white;
      font-weight: 700;
      padding: 30px 40px 10px 40px;
      outline: none;
    }

    #content {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 1.1rem;
      line-height: 1.7;
      padding: 10px 40px;
      flex: 1;
      resize: none;
      outline: none;
    }

    /* AI Panel */
    .ai-panel {
      width: 320px;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px;
      transition: width 0.3s ease, padding 0.3s ease;
    }

    .ai-panel.closed { width: 0; padding: 0; overflow: hidden; border-left: none; }

    .ai-header { font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; }

    .note-item {
      padding: 10px;
      margin-bottom: 5px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
      color: var(--text-dim);
    }
    .note-item:hover { background: #232a3d; color: white; }
    .note-item.active { background: var(--accent); color: var(--bg); font-weight: 600; }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-bottom: 10px;
    }

    .toggle-group {
      display: flex;
      background: var(--bg);
      border-radius: 6px;
      padding: 3px;
      margin-bottom: 15px;
    }
    .toggle-group button {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-dim);
      padding: 6px;
      cursor: pointer;
      border-radius: 4px;
    }
    .toggle-group button.active { background: #232a3d; color: var(--accent); }

    #response {
      background: var(--bg);
      padding: 15px;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.5;
      flex: 1;
      overflow-y: auto;
      white-space: pre-wrap;
      color: #cbd5e1;
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <div class="sidebar-content">
      <button class="btn-primary" onclick="newNote()">+ New Note</button>
      <div id="notesList"></div>
    </div>
  </div>

  <div class="editor-container">
    <div class="toolbar">
      <button class="icon-btn" onclick="toggleSidebar()">☰</button>
      <div style="flex: 1"></div>
      <button class="icon-btn" onclick="toggleAI()">🪄 AI Assistant</button>
    </div>
    <input id="title" placeholder="Note Title" oninput="saveCurrentNote()">
    <textarea id="content" placeholder="Type your thoughts here..." oninput="saveCurrentNote()"></textarea>
  </div>

  <div id="aiPanel" class="ai-panel">
    <div class="ai-header">
      <span>AI TOOLS</span>
      <button class="icon-btn" style="font-size: 0.9rem" onclick="toggleAI()">✕</button>
    </div>

    <div class="toggle-group">
      <button id="modeLocal" class="active" onclick="setMode('local')">Local</button>
      <button id="modeCloud" onclick="setMode('cloud')">Cloud</button>
    </div>

    <button class="btn-primary" style="background: #2d3748; color: white;" onclick="aiAction('summarize')">Summarize</button>
    <button class="btn-primary" style="background: #2d3748; color: white;" onclick="aiAction('improve')">Improve Writing</button>
    
    <div id="response">Waiting for request...</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
